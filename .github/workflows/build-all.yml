name: Build Pulse Messenger
on: [push]

jobs:
  # СБОРКА ДЛЯ WINDOWS
  windows-dist:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Build Desktop App
        run: |
          nativefier --name "Pulse Messenger" --platform "windows" "https://auragram-telegram-web.hf.space" --internal-urls ".*" build/

      - name: Create Installer (Inno Setup)
        run: iscc installer.iss

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-Windows-Setup
          path: dist/PulseMessengerSetup.exe

  # СБОРКА ДЛЯ ANDROID
  android-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Fix AndroidX Error
        # Эта команда создает файл настроек, который требует ошибка EvalIssueException
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Android APK
        # Собираем APK, пропуская тесты и проверки
        run: gradle assembleDebug -x test -x lint --stacktrace

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-Android-APK
          path: app/build/outputs/apk/debug/app-debug.apk
