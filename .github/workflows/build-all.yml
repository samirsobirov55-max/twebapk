name: Build Pulse Messenger (Multiplatform)
on: [push]

jobs:
  # СБОРКА ДЛЯ WINDOWS (.EXE ИНСТАЛЛЯТОР)
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Build Tools
        run: |
          npm install -g nativefier
          npm install -g png-to-ico

      - name: Prepare Icon
        shell: pwsh
        run: npx png-to-ico icon.png > icon.ico

      - name: Build App
        run: |
          nativefier --name "Pulse Messenger" --platform "windows" --icon "icon.ico" "https://auragram-telegram-web.hf.space" --internal-urls ".*" build/

      - name: Create Installer (Inno Setup)
        run: iscc installer.iss

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-Messenger-Windows
          path: dist/PulseMessengerSetup.exe

  # СБОРКА ДЛЯ ANDROID (.APK)
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-Messenger-Android
          path: app/build/outputs/apk/debug/app-debug.apk

